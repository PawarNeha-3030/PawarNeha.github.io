<!-- Navbar with Language Selector -->
<nav class="navbar">
    <div class="container nav-container">
        <a href="/" class="logo">
            <i class="fas fa-seedling"></i>
            <span>AnnadatAI</span>
        </a>
        
        <div class="nav-links">
            <a href="/" data-translate="nav_home">🏠 Home</a>
            <a href="/location" data-translate="nav_location">📍 Location</a>
            <a href="/crops" data-translate="nav_crops">🌱 Crops</a>
            <a href="/water" data-translate="nav_water">💧 Water</a>
            <a href="/diseases" data-translate="nav_diseases">⚠️ Diseases</a>
            <a href="/calendar" data-translate="nav_calendar">📅 Calendar</a>
        </div>
        
        <!-- Language Selector -->
        <div class="language-selector">
            <button class="language-btn" onclick="toggleLanguageMenu()">
                <i class="fas fa-globe"></i>
                <span id="current-language">EN</span>
                <i class="fas fa-chevron-down"></i>
            </button>
            <div class="language-menu" id="languageMenu">
                <div class="language-option" onclick="changeLanguage('en')">
                    <span class="flag">🇺🇸</span>
                    <span>English</span>
                </div>
                <div class="language-option" onclick="changeLanguage('hi')">
                    <span class="flag">🇮🇳</span>
                    <span>हिंदी</span>
                </div>
                <div class="language-option" onclick="changeLanguage('te')">
                    <span class="flag">🇮🇳</span>
                    <span>తెలుగు</span>
                </div>
                <div class="language-option" onclick="changeLanguage('ta')">
                    <span class="flag">🇮🇳</span>
                    <span>தமிழ்</span>
                </div>
                <div class="language-option" onclick="changeLanguage('bn')">
                    <span class="flag">🇧🇩</span>
                    <span>বাংলা</span>
                </div>
                <div class="language-option" onclick="changeLanguage('mr')">
                    <span class="flag">🇮🇳</span>
                    <span>मराठी</span>
                </div>
                <div class="language-option" onclick="changeLanguage('gu')">
                    <span class="flag">🇮🇳</span>
                    <span>ગુજરાતી</span>
                </div>
                <div class="language-option" onclick="changeLanguage('kn')">
                    <span class="flag">🇮🇳</span>
                    <span>ಕನ್ನಡ</span>
                </div>
                <div class="language-option" onclick="changeLanguage('ml')">
                    <span class="flag">🇮🇳</span>
                    <span>മലയാളം</span>
                </div>
                <div class="language-option" onclick="changeLanguage('pa')">
                    <span class="flag">🇮🇳</span>
                    <span>ਪੰਜਾਬੀ</span>
                </div>
            </div>
        </div>
        
        <button class="mobile-menu-btn">
            <i class="fas fa-bars"></i>
        </button>
    </div>
</nav>

<!-- Language Selector Styles -->
<style>
    /* ===== LANGUAGE SELECTOR ===== */
    .language-selector {
        position: relative;
        margin-left: 20px;
    }

    .language-btn {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 10px 15px;
        background: var(--primary);
        color: white;
        border: none;
        border-radius: 25px;
        cursor: pointer;
        font-size: 0.9rem;
        font-weight: 500;
        transition: var(--transition);
    }

    .language-btn:hover {
        background: var(--primary-dark);
        transform: translateY(-2px);
    }

    .language-menu {
        position: absolute;
        top: 100%;
        right: 0;
        background: white;
        border-radius: 10px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
        min-width: 200px;
        z-index: 1000;
        opacity: 0;
        visibility: hidden;
        transform: translateY(-10px);
        transition: var(--transition);
        margin-top: 10px;
    }

    .language-menu.active {
        opacity: 1;
        visibility: visible;
        transform: translateY(0);
    }

    .language-option {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px 16px;
        cursor: pointer;
        transition: var(--transition);
        border-bottom: 1px solid var(--light-gray);
    }

    .language-option:last-child {
        border-bottom: none;
    }

    .language-option:hover {
        background: var(--light);
        color: var(--primary);
    }

    .language-option .flag {
        font-size: 1.2rem;
    }

    .language-option span:last-child {
        font-weight: 500;
    }

    .mobile-menu-btn {
        display: none;
        background: none;
        border: none;
        font-size: 1.5rem;
        color: var(--dark);
        cursor: pointer;
    }

    @media (max-width: 768px) {
        .nav-links {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            width: 100%;
            background: white;
            flex-direction: column;
            padding: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        
        .nav-links.active {
            display: flex;
        }
        
        .mobile-menu-btn {
            display: block;
        }
    }
</style>
